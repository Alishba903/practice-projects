<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Image Slider</title>
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
    <div class="slider">
      <button class="btn" id="back">❮</button>

      <div class="img-container">
        <img id="slider-img" src="images/pic1.jpg" alt="slider image" />

        <div class="title" id="img-title">Nature View</div>
      </div>

      <button class="btn" id="forth">❯</button>

      <div class="dots" id="dots-container"></div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
